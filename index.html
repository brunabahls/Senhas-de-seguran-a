<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🔐 Gerador de Senhas</h1>

    <input type="text" id="senha" readonly>

    <button id="gerarSenha">Gerar Senha</button>

    <div class="config">
        <h3>Quantidade de caracteres</h3>

        <div class="contador">
            <button id="diminuir">-</button>
            <span id="tamanho">12</span>
            <button id="aumentar">+</button>
        </div>

        <h3>Caracteres</h3>

        <label>
            <input type="checkbox" id="maiusculas" checked>
            Letras Maiúsculas
        </label>

        <label>
            <input type="checkbox" id="minusculas" checked>
            Letras Minúsculas
        </label>

        <label>
            <input type="checkbox" id="numeros" checked>
            Números
        </label>

        <label>
            <input type="checkbox" id="simbolos" checked>
            Símbolos
        </label>

        <h3>Força da Senha</h3>

        <div class="barra">
            <div id="forca"></div>
        </div>

        <p id="textoForca">Média</p>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
