<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section class="conteudo">

        <div class="conteudo-titulo">
            <img src="unlock.svg" alt="Cadeado">
            <h2 class="titulo-principal">Gerador de Senhas</h2>
            <h3 class="titulo-secundario">
                Gere instantaneamente uma senha aleatória e segura
            </h3>
        </div>

        <div class="conteudo-senha">
            <label for="campo-senha">Senha</label>
            <input type="text" id="campo-senha" readonly>

            <button id="gerarSenha" class="botao-gerar">
                Gerar Senha
            </button>
        </div>

        <div class="parametro">

            <h3 class="parametro-titulo">
                Personalize sua senha
            </h3>

            <div class="parametro-coluna__senha">

                <!-- Número de caracteres -->

                <div class="parametro-senha">

                    <h4 class="parametro-senha__titulo">
                        Número de caracteres
                    </h4>

                    <div class="parametro-senha-botoes">

                        <button id="diminuir" class="parametro-senha__botao">
                            -
                        </button>

                        <p id="numeroCaracteres" class="parametro-senha__texto">
                            12
                        </p>

                        <button id="aumentar" class="parametro-senha__botao">
                            +
                        </button>

                    </div>

                </div>

                <!-- Características -->

                <div class="parametro-senha">

                    <h4 class="parametro-senha__titulo">
                        Características da senha
                    </h4>

                    <label>
                        <input type="checkbox" id="maiusculas" checked>
                        Letras maiúsculas
                    </label>

                    <label>
                        <input type="checkbox" id="minusculas" checked>
                        Letras minúsculas
                    </label>

                    <label>
                        <input type="checkbox" id="numeros" checked>
                        Números
                    </label>

                    <label>
                        <input type="checkbox" id="simbolos" checked>
                        Símbolos
                    </label>

                </div>

                <!-- Força -->

                <div class="parametro-senha">

                    <h4 class="parametro-senha__titulo">
                        Força da senha
                    </h4>

                    <div class="barra-forca">
                        <div id="nivelForca" class="nivel-forca"></div>
                    </div>

                    <p id="textoForca">
                        Média
                    </p>

                </div>

            </div>

        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
